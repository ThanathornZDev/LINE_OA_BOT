<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลืมรหัสผ่านแอดมิน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f3f7ff 0%, #dbeafe 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .auth-card {
            width: 100%;
            max-width: 460px;
            border: 0;
            border-radius: 16px;
            box-shadow: 0 12px 36px rgba(15, 23, 42, 0.12);
        }

        .shop-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #0d6efd;
            color: #fff;
            font-size: 1.45rem;
        }
    </style>
</head>
<body>
    <div class="card auth-card">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="shop-icon mb-3"><i class="bi bi-shield-lock"></i></div>
                <h4 class="mb-1">ลืมรหัสผ่านแอดมิน</h4>
                <p class="text-muted mb-0">ยืนยันตัวตนด้วย SECRET CODE แล้วตั้งรหัสผ่านใหม่</p>
            </div>

            {% if error_message %}
            <div class="alert alert-danger" role="alert">
                {{ error_message }}
            </div>
            {% endif %}

            {% if success_message %}
            <div class="alert alert-success" role="alert">
                {{ success_message }}
            </div>
            {% endif %}

            <form method="POST" action="/admin/forgot-password">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" value="{{ admin_username }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">SECRET CODE</label>
                    <input type="password" name="secret_code" class="form-control" autocomplete="off" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">รหัสผ่านใหม่</label>
                    <input type="password" name="new_password" class="form-control" minlength="8" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">ยืนยันรหัสผ่านใหม่</label>
                    <input type="password" name="confirm_password" class="form-control" minlength="8" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-arrow-clockwise"></i> รีเซ็ตรหัสผ่าน
                </button>
            </form>

            <div class="mt-3 text-center">
                <a href="/admin/login" class="link-secondary text-decoration-none">
                    <i class="bi bi-arrow-left"></i> กลับไปหน้าเข้าสู่ระบบ
                </a>
            </div>
        </div>
    </div>
</body>
</html>
