<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f3f7ff 0%, #dbeafe 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            border: 0;
            border-radius: 16px;
            box-shadow: 0 12px 36px rgba(15, 23, 42, 0.12);
        }

        .shop-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #0d6efd;
            color: #fff;
            font-size: 1.45rem;
        }
    </style>
</head>
<body>
    <div class="card login-card">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="shop-icon mb-3"><i class="bi bi-shield-lock-fill"></i></div>
                <h4 class="mb-1">เข้าสู่ระบบแอดมิน</h4>
                <p class="text-muted mb-0">กรอกชื่อผู้ใช้และรหัสผ่านเพื่อเข้าใช้งานหลังบ้าน</p>
            </div>

            {% if error_message %}
            <div class="alert alert-danger" role="alert">
                {{ error_message }}
            </div>
            {% endif %}

            <form method="POST" action="/admin/login">
                <input type="hidden" name="next" value="{{ next_path }}">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" autocomplete="username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right"></i> เข้าสู่ระบบ
                </button>
            </form>

            <div class="mt-3 text-center">
                <a href="/admin/forgot-password" class="link-secondary text-decoration-none">
                    <i class="bi bi-key"></i> ลืมรหัสผ่าน? รีเซ็ตด้วย SECRET CODE
                </a>
            </div>
        </div>
    </div>
</body>
</html>
