<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .sidebar {
            height: 100vh;
            background-color: #212529;
            color: white;
            position: fixed;
            width: 250px;
        }
        .main-content {
            margin-left: 250px;
            padding: 20px;
            background-color: #f8f9fa;
            min-height: 100vh;
        }
        .nav-link {
            color: #adb5bd;
        }
        .nav-link:hover, .nav-link.active {
            color: #fff;
            background-color: #0d6efd;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="sidebar d-flex flex-column p-3">
        <h4 class="text-center py-3"><i class="bi bi-shop"></i> ร้านค้า Bot</h4>
        <ul class="nav flex-column mb-auto">
            <li class="nav-item mb-2">
                <a href="/admin" class="nav-link {% if request.path == '/admin' %}active{% endif %}">
                    <i class="bi bi-speedometer2 me-2"></i> แดชบอร์ด (แจ้งเตือน)
                </a>
            </li>
            <li class="nav-item mb-2">
                <a href="/admin/kitchen" class="nav-link {% if request.path == '/admin/kitchen' %}active{% endif %}">
                    <i class="bi bi-fire me-2"></i> ครัว (KDS)
                </a>
            </li>
            <li class="nav-item mb-2">
                <a href="/admin/orders" class="nav-link {% if request.path == '/admin/orders' %}active{% endif %}">
                    <i class="bi bi-receipt me-2"></i> รายการสั่งซื้อ
                </a>
            </li>
            <li class="nav-item mb-2">
                <a href="/admin/products" class="nav-link {% if request.path == '/admin/products' %}active{% endif %}">
                    <i class="bi bi-box-seam me-2"></i> เมนู และ สต๊อกสินค้า
                </a>
            </li>
            <li class="nav-item mb-2">
                <a href="/admin/inventory-logs" class="nav-link {% if request.path == '/admin/inventory-logs' %}active{% endif %}">
                    <i class="bi bi-journal-text me-2"></i> Log คลังสินค้า
                </a>
            </li>
            <li class="nav-item mb-2">
                <a href="/admin/sales" class="nav-link {% if request.path == '/admin/sales' %}active{% endif %}">
                    <i class="bi bi-graph-up me-2"></i> สรุปยอดขาย
                </a>
            </li>
            <li class="nav-item mb-2">
                <a href="/admin/settings" class="nav-link {% if request.path == '/admin/settings' %}active{% endif %}">
                    <i class="bi bi-gear me-2"></i> ตั้งค่าร้านค้า
                </a>
            </li>
            <li class="nav-item mb-2">
                <a href="/admin/logout" class="nav-link text-danger">
                    <i class="bi bi-box-arrow-right me-2"></i> ออกจากระบบ
                </a>
            </li>
        </ul>
    </div>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
